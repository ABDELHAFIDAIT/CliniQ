name : CliniQ CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/cliniq-backend
  DOCKER_TAG: ${{ github.sha }} 

jobs:
    code-quality:
        name: Code Quality (Linting and Formatting)
        runs-on: ubuntu-latest
        steps :
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Set up Python 3.11
              uses : actions/setup-python@v5
              with:
                python-version: 3.11
            
            - name: Install Quality Tools
              run: pip install ruff black

            - name: Run Black (vérification du formatage)
              run: black --check app tests

            - name: Run Ruff (linter rapide, remplace flake8 + isort)
              run: ruff check app tests
    
    unit-tests:
        name: Unit & Mock Tests
        runs-on: ubuntu-latest
        needs: code-quality
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Set Up Python 3.11
              uses: actions/setup-python@v5
              with: 
                python-version: "3.11"

            - name: Install Dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
                pip install pytest pytest-asyncio httpx pytest-mock pytest-cov
            
            - name: Run Pytest
              run: pytest tests/test_api_rag.py -v --cov=app --cov-report=term-missing
              env :
                DATABASE_URL: "sqlite:///./test.db"
                QDRANT_URL: "http://localhost:6333"
                QDRANT_COLLECTION: "cliniq_docs"
                OLLAMA_BASE_URL: "http://localhost:11434"
                EMBEDDING_MODEL: "fake-model"
                EVAL_LLM_MODEL: "gemini-flash-latest"
                MLFLOW_TRACKING_URI: "http://localhost:5000"
                MLFLOW_EXPERIMENT_NAME: "test_exp"
                GEMINI_API_KEY: "dummy_key"
                JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
                JWT_ALGORITHM: "HS256"
                ACCESS_TOKEN_EXPIRE_MINUTES: "30"
                CHUNK_SIZE: "1000"
                CHUNK_OVERLAP: "200"
    
    deploy:
        name: Contineous Deployement
        runs-on: ubuntu-latest
        needs: unit-tests
        if: github.event_name == 'push'
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                  ${{ env.DOCKER_IMAGE }}:latest
                  ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
                cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
                cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

            